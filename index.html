<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impulse Rush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="menu">

  <h1>IMPULSE RUSH</h1>

  <div id="menuButtons">
    <button onclick="showPlay()">PLAY</button>
    <button onclick="showRules()">RULES</button>
    <button onclick="showLeaderboard()">LEADERBOARD</button>
  </div>

</div>

<!-- PLAY MENU -->
<div id="playMenu" class="hidden">
  <h2>Select Difficulty</h2>

  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="normal" selected>Normal</option>
    <option value="hard">Hard</option>
    <option value="hell">Hell</option>
    <option value="impossible">Impossible</option>
  </select>

  <button onclick="startGame()">START</button>
  <button onclick="backMenu()">BACK</button>
</div>

<!-- RULES -->
<div id="rulesMenu" class="hidden">
  <h2>RULES</h2>

  <div class="box">
    Speed increases every 2 seconds.<br>
    +50 at 5 seconds survival.<br>
    +50 every 10 seconds.<br>
    Don’t miss jumps.<br>
    One mistake = death.
  </div>

  <button onclick="backMenu()">BACK</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardMenu" class="hidden">
  <h2>LEADERBOARD</h2>

  <div id="leaderboard"></div>

  <button onclick="backMenu()">BACK</button>
</div>

<!-- GAME -->
<div id="hud" class="hidden">
  <div>SCORE: <span id="score">0</span></div>
  <div>TIME: <span id="time">0</span></div>
  <div>SPEED: <span id="speed">1</span>x</div>
</div>

<div id="game" class="hidden">
  <div id="track"></div>
  <div id="player"></div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="hidden">
  <h1>GAME OVER</h1>
  <div>Score: <span id="finalScore"></span></div>
</div>

<script src="script.js"></script>
</body>
</html>
