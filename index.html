<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Impulse Rush</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MAIN MENU -->
<div id="menu" class="screen">
  <div class="title">IMPULSE RUSH</div>

  <div class="menuBox">
    <button onclick="openPlay()">PLAY</button>
    <button onclick="openRules()">RULES</button>
    <button onclick="openLeaderboard()">LEADERBOARD</button>
  </div>
</div>

<!-- PLAY -> DIFFICULTY -->
<div id="playMenu" class="screen hidden">
  <div class="titleSmall">SELECT DIFFICULTY</div>

  <div class="menuBox">
    <button onclick="startGame('easy')">EASY</button>
    <button onclick="startGame('normal')">NORMAL</button>
    <button onclick="startGame('hard')">HARD</button>
    <button onclick="startGame('hell')">HELL</button>
    <button onclick="startGame('impossible')">IMPOSSIBLE</button>

    <button class="back" onclick="backToMenu()">BACK</button>
  </div>
</div>

<!-- RULES -->
<div id="rulesMenu" class="screen hidden">
  <div class="titleSmall">RULES</div>

  <div class="box">
    Jump over obstacles.<br>
    Speed increases every 2 seconds.<br>
    +50 at 5 seconds.<br>
    +50 every 10 seconds.<br>
    One mistake = game over.
  </div>

  <button class="back" onclick="backToMenu()">BACK</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboardMenu" class="screen hidden">
  <div class="titleSmall">LEADERBOARD</div>

  <div id="leaderboard"></div>

  <button class="back" onclick="backToMenu()">BACK</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div>SCORE: <span id="score">0</span></div>
  <div>TIME: <span id="time">0</span></div>
  <div>SPEED: <span id="speed">1</span>x</div>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div id="track"></div>
  <div id="player"></div>
</div>

<!-- GAME OVER -->
<div id="gameOver" class="hidden">
  <div class="titleSmall">GAME OVER</div>
  <div id="finalScore"></div>
</div>

<script src="script.js"></script>
</body>
</html>
