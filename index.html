<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impulse Rush</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="menu">
    <h1>IMPULSE RUSH</h1>

    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="normal" selected>Normal</option>
      <option value="hard">Hard</option>
      <option value="hell">Hell</option>
      <option value="impossible">Impossible</option>
    </select>

    <button id="startButton">START GAME</button>
  </div>

  <div id="hud" class="hidden">
    <div>SCORE: <span id="score">0</span></div>
    <div>TIME: <span id="time">0</span></div>
    <div>SPEED: <span id="speed">1</span>x</div>
  </div>

  <div id="countdown" class="hidden">10</div>

  <div id="game" class="hidden">
    <div class="lane" data-lane="0"></div>
    <div class="lane" data-lane="1"></div>
    <div class="lane" data-lane="2"></div>
    <div class="lane" data-lane="3"></div>
    <div class="lane" data-lane="4"></div>

    <div id="player"></div>
  </div>

  <div id="gameOver" class="hidden">
    <h1>GAME OVER</h1>

    <p>Final Score: <span id="finalScore"></span></p>

    <button onclick="restartGame()">
      RESTART
    </button>
  </div>

  <script src="script.js"></script>

</body>
</html>
